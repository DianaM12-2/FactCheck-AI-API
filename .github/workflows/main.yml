name: CI — Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: factcheck-ai-api
      - name: Run tests
        run: pytest tests/ -v
        working-directory: factcheck-ai-api
      - name: Build Docker image
        run: docker build -t factcheck-ai-api:latest .
        working-directory: factcheck-ai-api
